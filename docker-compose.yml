services:
  backend:
    restart: always
    build: ./backend
    ports:
      - "8081:3001"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8081
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-missing-google-client-id}
    ports:
      - "3000:80"
    env_file:
      - ./frontend/.env